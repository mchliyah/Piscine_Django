{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h3 mb-4">Account</h1>
              <div id="account-feedback" class="mb-3"></div>
              <div id="account-container"
                   data-login-url="{% url 'account:ajax_login' %}"
                   data-logout-url="{% url 'account:ajax_logout' %}">
                {% if user.is_authenticated %}
                  {% include 'account/_logged_in.html' %}
                {% else %}
                  {{ login_form_html|safe }}
                {% endif %}
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{% static 'account/account.js' %}"></script>
  </body>
</html>
