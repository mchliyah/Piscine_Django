{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ room.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 m-0">{{ room.name }}</h1>
        <a href="{% url 'chat:room_list' %}" class="btn btn-outline-secondary btn-sm">Back to rooms</a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <div class="text-muted mb-2">Connected as <strong>{{ request.user.username }}</strong></div>

          <div id="messages" class="border rounded p-3 mb-3 bg-white" style="height: 360px; overflow-y: auto;">
            {% for message in messages %}
              <div class="mb-2">
                {% if message.is_system %}
                  <span class="badge text-bg-secondary me-2">system</span>
                  <span>{{ message.content }}</span>
                {% else %}
                  <strong>{{ message.user.username }}:</strong>
                  <span>{{ message.content }}</span>
                {% endif %}
              </div>
            {% endfor %}
          </div>

          <form id="chat-form" class="d-flex gap-2">
            <input id="chat-input" class="form-control" type="text" maxlength="500" placeholder="Type a message..." autocomplete="off" required>
            <button class="btn btn-primary" type="submit">Send</button>
          </form>
        </div>
      </div>
    </main>

    <script>
      window.chatRoomSlug = "{{ room.slug }}";
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{% static 'chat/chat_room.js' %}"></script>
  </body>
</html>
