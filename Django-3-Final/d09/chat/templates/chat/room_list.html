<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h3 mb-4">Chat rooms</h1>
          <p class="text-muted">Logged in as <strong>{{ request.user.username }}</strong></p>
          <ul class="list-group">
            {% for room in rooms %}
              <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>{{ room.name }}</span>
                <a class="btn btn-sm btn-primary" href="{% url 'chat:room_detail' room.slug %}">Join</a>
              </li>
            {% empty %}
              <li class="list-group-item">No rooms available.</li>
            {% endfor %}
          </ul>
        </div>
      </div>
    </main>
  </body>
</html>
