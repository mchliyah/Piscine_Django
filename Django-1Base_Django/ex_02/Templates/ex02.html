<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 02 - First form</title>
</head>
<body>
    <h1>Exercise 02 - First form</h1>

    <section>
        <h2>Submit text</h2>
        <form method="post" action="/ex02">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Submit</button>
        </form>
    </section>

    <section>
        <h2>Input history</h2>
        {% if history %}
            <ul>
                {% for entry in history %}
                    <li>[{{ entry.timestamp }}] {{ entry.text }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No history yet.</p>
        {% endif %}
    </section>
</body>
</html>
