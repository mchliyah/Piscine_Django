<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 03 - Fifty shades of bic</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
        }

        table {
            border-collapse: collapse;
        }

        th, td {
            width: 80px;
            height: 40px;
            text-align: center;
            border: 1px solid #222;
        }

        th {
            color: #fff;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            {% for column in columns %}
                <th style="background-color: {{ column.header_color }};">{{ column.name }}</th>
            {% endfor %}
        </tr>
        {% for row in rows %}
            <tr>
                {% for shade in row %}
                    <td style="background-color: {{ shade }};"></td>
                {% endfor %}
            </tr>
        {% endfor %}
    </table>
</body>
</html>
